spring.application.name=inkumanga

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inkumanga?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jikan.base-url=${JIKAN_BASE_URL:https://api.jikan.moe/v4}

jwt.secret=${JWT_SECRET:bibliotecaduoc-clave-secreta-jwt-2026-cambiar-en-produccion}

server.forward-headers-strategy=framework