spring.application.name=inkumanga
# Conexion a MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/inkumanga?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jikan.base-url=https://api.jikan.moe/v4


# Spring Security - JWT
# IMPORTANTE: cambia este valor en produccion por uno aleatorio largo (min 32 caracteres)
jwt.secret=bibliotecaduoc-clave-secreta-jwt-2026-cambiar-en-produccion